name: release

# Publish to GitHub Packages so the private @verevoir consumers (which route the
# whole scope there) can resolve this lib. It stays public on npmjs; this ADDS
# the GitHub Packages copy of the current version. workflow_dispatch backfills
# the current version without a bump; a v* tag publishes future releases.
on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  publish-github-packages:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Publish to GitHub Packages
        run: |
          printf '//npm.pkg.github.com/:_authToken=%s\n' "$NODE_AUTH_TOKEN" > "$RUNNER_TEMP/.npmrc"
          npm publish --userconfig "$RUNNER_TEMP/.npmrc" --registry https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
